<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿媛工具箱</title>
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>

    <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                阿媛工具箱
            </div>
            <button class="tool-nav-btn active" type="button" data-target="tool-logo">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                商标生成器
            </button>
            <button class="tool-nav-btn" type="button" data-target="tool-calendar">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                日历生成器
            </button>
        </div>

        <div class="preview-pane">
            <div id="preview-tool-logo" class="preview-content active">
                <div class="canvas-wrapper">
                    <canvas id="previewCanvas" width="800" height="800"></canvas>
                    <div class="empty-state is-hidden" id="emptyState">
                        <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span>暂无图片</span>
                    </div>
                </div>
            </div>

            <div id="preview-tool-calendar" class="preview-content">
                <div id="capture-area">
                    <div class="header-bg" id="header-bg">
                        <div class="logo-area">
                            <img class="company-logo" alt="壹点企服" src="assets/images/company-logo.png">
                        </div>
                        <div class="calendar-title">
                            <div class="title-month" id="title-month">--</div>
                            <div class="title-sub">
                                <span id="title-year">----</span>
                                <span>壹点日历</span>
                            </div>
                        </div>
                    </div>
                    <div class="calendar-card">
                        <div class="weekdays"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>
                        <div id="calendar-grid"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-pane">
            <div id="controls-tool-logo" class="tool-control-group active">
                <div class="header">
                    <h1>商标图样生成</h1>
                    <p>生成符合官方申报标准的高清图样</p>
                </div>

                <div class="segmented-control">
                    <button class="tab-btn active" type="button" data-tab="text">纯文字排版</button>
                    <button class="tab-btn" type="button" data-tab="image">已有图片处理</button>
                </div>

                <div class="tab-panel active" id="panel-text">
                    <div class="control-group">
                        <label>商标文字内容</label>
                        <input type="text" id="textInput" placeholder="输入商标名称..." value="">
                    </div>
                    <div class="control-group">
                        <label>字体风格</label>
                        <select id="fontSelect">
                            <option value="SimHei, Heiti SC, sans-serif">黑体 (现代、规整)</option>
                            <option value="SimSun, Songti SC, serif">宋体 (传统、端庄)</option>
                            <option value="KaiTi, Kaiti SC, serif">楷体 (书法、柔和)</option>
                            <option value="Microsoft YaHei, PingFang SC, sans-serif">微软雅黑/苹方 (大方、清新)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <div class="slider-header">
                            <label class="inline-label">字号大小</label>
                            <span class="slider-value" id="fontSizeVal">150px</span>
                        </div>
                        <input type="range" id="fontSizeRange" min="50" max="350" value="150">
                    </div>
                    <button class="btn-primary" id="btnSaveText" type="button">导出</button>
                </div>

                <div class="tab-panel" id="panel-image">
                    <div class="upload-zone" id="dropZone">
                        <svg id="uploadIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <div class="text-wrapper">
                            <div class="main-text" id="uploadStatus">点击或拖拽上传图片</div>
                            <div class="sub-text" id="uploadSubText">支持 JPG / PNG，自动白底适配</div>
                        </div>
                        <input class="input-hidden" type="file" id="fileInput" accept="image/*">
                    </div>
                    <div class="img-info" id="imageStats">
                        <div class="info-item"><span>原始分辨率</span><span id="statOrig">-</span></div>
                        <div class="info-item"><span>输出分辨率</span><span id="statOut">-</span></div>
                        <div class="info-item"><span>预估大小</span><span id="statSize">-</span></div>
                        <div class="info-item"><span>合规检查</span><span id="statCheck">-</span></div>
                    </div>
                    <div class="control-group">
                        <div class="slider-header">
                            <label class="inline-label">强制输出尺寸 (正方形)</label>
                            <span class="slider-value" id="imgSizeVal">800px</span>
                        </div>
                        <input type="range" id="imgSizeRange" min="400" max="1500" value="800" step="50">
                    </div>
                    <div class="control-group control-group-tight">
                        <div class="slider-header">
                            <label class="inline-label">画质压缩率</label>
                            <span class="slider-value" id="imgQualityVal">90%</span>
                        </div>
                        <input type="range" id="imgQualityRange" min="50" max="100" value="90">
                    </div>
                    <button class="btn-primary" id="btnSaveImage" type="button">导出</button>
                </div>
            </div>

            <div id="controls-tool-calendar" class="tool-control-group">
                <div class="header">
                    <h1>壹点日历生成</h1>
                    <p>左侧点击日期勾选休息日</p>
                </div>

                <div class="control-group">
                    <div class="slider-header">
                        <label class="inline-label">调整生成月份</label>
                        <button class="text-btn-subtle" id="cal-bg-trigger" type="button">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            <span>自定义背景</span>
                        </button>
                        <input class="input-hidden" type="file" id="cal-bg-upload" accept="image/*">
                    </div>
                    
                    <div class="cal-month-nav">
                        <button class="cal-nav-btn" id="cal-prev-btn" type="button" aria-label="上一月">&#10094;</button>
                        <span class="cal-month-display" id="current-month-display">加载中...</span>
                        <button class="cal-nav-btn" id="cal-next-btn" type="button" aria-label="下一月">&#10095;</button>
                    </div>
                </div>

                <div class="cal-summary-box">
                    <span class="cal-summary-label">本月排休总天数</span>
                    <span class="cal-summary-value" id="summary-rest-days">- 天</span>
                </div>

                <button class="btn-primary btn-cal" id="download-cal-btn" type="button">导出</button>
            </div>

            <div class="developer-message">
                <span class="dev-en">Designed &amp; Developed with care by 阿翔, for 阿媛</span>
                <span class="dev-zh">把重复交给工具，把时间还给生活。</span>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/shared.js"></script>
    <script src="assets/js/logo-tool.js"></script>
    <script src="assets/js/calendar-tool.js"></script>
    <script src="assets/js/bootstrap.js"></script>
</body>

</html>
